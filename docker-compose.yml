version: "3.8"

services:
  backend:
    image: rifaz15072000/fastapi-backend:latest
    container_name: backend
    ports:
      - "5000:5000"

  frontend:
    image: rifaz15072000/nextjs-frontend:latest
    container_name: frontend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
