version: "3.8"

services:
  backend:
    build: ./backend
    image: rifaz15072000/fastapi-backend:latest
    container_name: backend
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    image: rifaz15072000/nextjs-frontend:latest
    container_name: frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-network

# ✅ Custom network
networks:
  app-network:
    driver: bridge